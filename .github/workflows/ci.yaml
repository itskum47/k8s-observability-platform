name: ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  security-events: write

jobs:
  yaml-validation:
    name: YAML validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Lint YAML
        uses: ibiqlik/action-yamllint@v3
        with:
          strict: true

  build-and-scan:
    name: Build and scan containers
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        run: |
          docker build \
            -t ghcr.io/your-org/k8s-observability-${{ matrix.service }}:${{ github.sha }} \
            ./apps/${{ matrix.service }}
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          image-ref: ghcr.io/your-org/k8s-observability-${{ matrix.service }}:${{ github.sha }}
          format: table
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
          exit-code: "1"

  manifest-validation:
    name: Kubernetes manifest validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install kubectl
        uses: azure/setup-kubectl@v4
      - name: Install Helm
        uses: azure/setup-helm@v4
      - name: Install kubeconform
        run: |
          curl -sSL -o /tmp/kubeconform.tar.gz https://github.com/yannh/kubeconform/releases/download/v0.7.0/kubeconform-linux-amd64.tar.gz
          tar -xzf /tmp/kubeconform.tar.gz -C /tmp
          sudo mv /tmp/kubeconform /usr/local/bin/kubeconform
      - name: Validate workload manifests and chart
        run: ./scripts/validate-manifests.sh
      - name: Validate monitoring resources
        run: kubeconform -strict -summary -ignore-missing-schemas monitoring/prometheus/platform-alert-rules.yaml monitoring/prometheus/platform-servicemonitor.yaml

  integration-deploy-smoke-rollback:
    name: Deploy, smoke test, rollback validation
    runs-on: ubuntu-latest
    needs: [yaml-validation, build-and-scan, manifest-validation]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install kubectl
        uses: azure/setup-kubectl@v4
      - name: Create Kind cluster
        uses: helm/kind-action@v1.12.0
        with:
          cluster_name: platform-ci
      - name: Build local images for integration
        run: |
          docker build -t ghcr.io/your-org/k8s-observability-backend:dev ./apps/backend
          docker build -t ghcr.io/your-org/k8s-observability-frontend:dev ./apps/frontend
      - name: Load images into Kind
        run: |
          kind load docker-image ghcr.io/your-org/k8s-observability-backend:dev --name platform-ci
          kind load docker-image ghcr.io/your-org/k8s-observability-frontend:dev --name platform-ci
      - name: Deploy dev overlay
        env:
          SKIP_MONITORING: "true"
        run: ./scripts/deploy.sh dev
      - name: Smoke test deployment
        run: ./scripts/smoke-test.sh dev
      - name: Simulate bad rollout
        run: |
          kubectl set image deployment/backend backend=ghcr.io/your-org/k8s-observability-backend:rollback-test -n observability-dev
          kubectl rollout status deployment/backend -n observability-dev --timeout=45s || true
      - name: Validate rollback
        run: ./scripts/rollback.sh dev backend
