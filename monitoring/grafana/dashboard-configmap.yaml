apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-grafana-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  k8s-platform-dashboard.json: |
    {
      "__inputs": [],
      "__requires": [],
      "annotations": { "list": [] },
      "editable": true,
      "panels": [
        {
          "type": "stat",
          "title": "Available Replicas",
          "gridPos": { "h": 6, "w": 8, "x": 0, "y": 0 },
          "targets": [{ "expr": "sum(kube_deployment_status_replicas_available{namespace=~\"observability-.*\"})", "refId": "A" }]
        },
        {
          "type": "stat",
          "title": "Pod Restarts (1h)",
          "gridPos": { "h": 6, "w": 8, "x": 8, "y": 0 },
          "targets": [{ "expr": "sum(increase(kube_pod_container_status_restarts_total{namespace=~\"observability-.*\"}[1h]))", "refId": "A" }]
        },
        {
          "type": "timeseries",
          "title": "Backend Request Rate",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 6 },
          "targets": [{ "expr": "sum(rate(backend_http_requests_total{namespace=~\"observability-.*\"}[5m])) by (path)", "refId": "A" }]
        }
      ],
      "schemaVersion": 39,
      "style": "dark",
      "tags": ["kubernetes", "observability", "platform"],
      "templating": { "list": [] },
      "time": { "from": "now-6h", "to": "now" },
      "title": "K8s Observability Platform (Embedded)",
      "version": 1
    }
