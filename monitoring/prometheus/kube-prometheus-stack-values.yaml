grafana:
  adminPassword: "change-this-in-secrets-manager"
  defaultDashboardsEnabled: true
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      searchNamespace: ALL

prometheus:
  prometheusSpec:
    retention: 15d
    scrapeInterval: 30s
    serviceMonitorSelector:
      matchLabels:
        monitoring: platform
    ruleSelector:
      matchLabels:
        monitoring: platform

alertmanager:
  enabled: true
  config:
    route:
      receiver: default-receiver
      group_by: ["alertname", "namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
    receivers:
      - name: default-receiver
